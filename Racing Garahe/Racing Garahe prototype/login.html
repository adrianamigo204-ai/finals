<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Racing Garahe Login</title>
    <link rel="icon" type="image/x-icon" href="images/favicon.jpeg">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="loginjs.js" defer></script>
</head>
<body class="login-page">
    <nav class="nav login-nav">
        <a class="brand" href="index2.html">Racing Garahe</a>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="index.html#about">About Us</a>
            <a href="index.html#service">Service</a>
            <a href="login.html">Login</a>
        </div>
    </nav>

    <main class="login-panel">
        <a class="brand small-brand" href="index.html">Racing Garahe</a>
        <h1>Account Login</h1>
        <p>Choose your access level and sign in to the motorcycle garage portal.</p>

        <form class="login-form" id="login-form">
            <select name="role" id="role" required>
                <option value="">Select Role</option>
                <option value="user">User</option>
                <option value="admin">Admin</option>
                <option value="super-admin">Super Admin</option>
            </select>
            <input type="text" name="username" id="username" placeholder="Username" required>
            <input type="password" name="password" id="password" placeholder="Password" required>
            <button type="submit">Login</button>
            <p class="form-message" id="form-message"></p>
        </form>
        <p class="login-note">Demo access: `user / user123`, `admin / admin123`, `superadmin / super123`.</p>
    </main>
</body>
</html>
